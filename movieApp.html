<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        body {
            background-color: #2c3285;
        }

        header {
            padding: 20px;
            background-color: rgb(76, 76, 210);
            color: white;
            display: flex;
            justify-content: space-between;
        }

        header input {
            border-radius: 10px;
            padding: 5px 12px;
        }

        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .movie {
            width: 250px;
            margin: 20px;
            background-color: #373b69;
            box-shadow: 0px 0px 10px 2px #ccc;
        }

        .movie img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-text {
            color: white;
            padding: 10px;
        }

        .movie h3 {
            margin-bottom: 10px;
        }

        .movie-text span {
            background-color: #22254b;
            padding: 5px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header>
        <h1>Movie App</h1>
        <input type="text" class="search" placeholder="Search text...">
    </header>
    <div class="movie-container">

    </div>
</body>
<script>

    let movieContainer = document.querySelector(".movie-container")
    let getMovieList = async (search = '') => {
        let apiUrl;
        if (search == '') {
            apiUrl =`https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=04c35731a5ee918f014970082a0088b1&page=1`
        }
        else {
            apiUrl =`https://api.themoviedb.org/3/search/movie?&api_key=04c35731a5ee918f014970082a0088b1&query=${search}`
        }
        let apiRes = await fetch(apiUrl)

        let data = await apiRes.json()// let {results}=await apiRes.json()
        let finalResults = data.results
        let movieItems = ''
        finalResults.forEach((obj) => {
            movieItems += ` <div class="movie">
            <img src="https://image.tmdb.org/t/p/w1280${obj.poster_path}" alt=""/>
            <div class="movie-text">
                <h3>${obj.original_title}</h3>
                <span>Date: ${obj.release_date} </span>
            </div>
        </div>`
        })
        movieContainer.innerHTML = movieItems
    }
    
    getMovieList()
    let searchInput = document.querySelector(".search")
    searchInput.addEventListener("keyup", () => {
        getMovieList(searchInput.value)
    })

    // console.log(apiRes); //Ans Raw Data= ProtoType: Response Me dekkhna hoga
    //  console.log(data); // also==console.log(data{`results`});   //Promise {<pending>}
</script>

</html>
